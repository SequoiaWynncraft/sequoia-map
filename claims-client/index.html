<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sequoia Claims Editor</title>
    <link data-trunk rel="css" href="input.css" />
    <link data-trunk rel="copy-dir" href="public/tiles" />
    <link data-trunk rel="copy-dir" href="public/icons" />
    <link data-trunk rel="copy-dir" href="public/fonts" />
    <script>
      (function () {
        const stylesheet = document.querySelector('link[rel="stylesheet"]');
        const href = stylesheet && stylesheet.href ? stylesheet.href : "";
        const pathname = href ? new URL(href, window.location.href).pathname : "";
        const assetBase = pathname
          ? pathname.replace(/\/[^/]*$/, "").replace(/\/$/, "")
          : "";
        const rawAssetVersion = "__SEQUOIA_ASSET_VERSION__".trim();
        const assetVersion =
          rawAssetVersion && !rawAssetVersion.includes("__SEQUOIA_")
            ? rawAssetVersion
            : "";
        const assetQuery = assetVersion ? `?v=${assetVersion}` : "";
        const fontUrl = (filename) => `${assetBase}/fonts/${filename}${assetQuery}`;

        window.__SEQUOIA_ASSET_BASE__ = assetBase;
        window.__SEQUOIA_ASSET_VERSION__ = rawAssetVersion;

        const preload = document.createElement("link");
        preload.rel = "preload";
        preload.href = fontUrl("minecraft-regular.otf");
        preload.as = "font";
        preload.type = "font/otf";
        preload.crossOrigin = "";
        document.head.appendChild(preload);

        const fontStyle = document.createElement("style");
        fontStyle.textContent = [
          '@font-face { font-family: "Silkscreen"; src: url("' + fontUrl("minecraft-regular.otf") + '") format("opentype"); font-style: normal; font-weight: 400; font-display: swap; }',
          '@font-face { font-family: "Silkscreen"; src: url("' + fontUrl("minecraft-italic.otf") + '") format("opentype"); font-style: italic; font-weight: 400; font-display: swap; }',
          '@font-face { font-family: "Silkscreen"; src: url("' + fontUrl("minecraft-bold.otf") + '") format("opentype"); font-style: normal; font-weight: 700; font-display: swap; }',
          '@font-face { font-family: "Silkscreen"; src: url("' + fontUrl("minecraft-bold-italic.otf") + '") format("opentype"); font-style: italic; font-weight: 700; font-display: swap; }',
          '@font-face { font-family: "SilkscreenLocal"; src: local("Minecraft"), url("' + fontUrl("minecraft-regular.otf") + '") format("opentype"); font-style: normal; font-weight: 400; font-display: swap; }',
        ].join("\n");
        document.head.appendChild(fontStyle);
      })();
    </script>
    <style>
      html, body, #app { width: 100%; height: 100%; margin: 0; }
      body {
        background: #0c0e17;
        color: #e6e3d9;
        font-family: "SilkscreenLocal", monospace;
        overflow: hidden;
      }
      #app-loading-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, rgba(245, 197, 66, 0.12), transparent 35%), #0c0e17;
        z-index: 9999;
      }
      .shell-core {
        display: grid;
        place-items: center;
        gap: 12px;
        width: min(92vw, 420px);
        text-align: center;
      }
      .shell-title {
        margin: 0;
        font-family: "SilkscreenLocal", monospace;
        font-size: clamp(0.95rem, 2.4vw, 1.3rem);
        letter-spacing: 0.08em;
        color: #f5c542;
        text-transform: uppercase;
      }
      .shell-spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(245, 197, 66, 0.25);
        border-top-color: #f5c542;
        animation: shell-spin 0.85s linear infinite;
      }
      .shell-step {
        margin: 2px 0 0;
        width: min(92vw, 340px);
        font-size: 0.66rem;
        line-height: 1.6;
        letter-spacing: 0.01em;
        color: #f5c542;
      }
      @keyframes shell-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .shell-spinner {
          animation: none;
        }
      }
    </style>
</head>
<body>
    <div id="app-loading-shell" role="status" aria-live="polite">
      <div class="shell-core">
        <div class="shell-spinner" aria-hidden="true"></div>
        <div class="shell-title">Loading Claims Editor</div>
        <p id="app-loading-step" class="shell-step">Preparing campaign board</p>
      </div>
    </div>
    <div id="app"></div>
</body>
</html>
