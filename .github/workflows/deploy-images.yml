name: Deploy Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-server
  INGEST_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-ingest
  EDGE_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-edge

jobs:
  changes:
    if: github.repository == 'SequoiaWynncraft/sequoia-map'
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ingest: ${{ steps.filter.outputs.ingest }}
      edge: ${{ steps.filter.outputs.edge }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Deploy-Relevant Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'shared/**'
              - 'client/**'
              - 'claims-client/**'
              - 'server/**'
            ingest:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'shared/**'
              - 'services/sequoia-ingest/**'
            edge:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'ops/caddy/**'
            deploy:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'shared/**'
              - 'client/**'
              - 'claims-client/**'
              - 'server/**'
              - 'services/sequoia-ingest/**'
              - 'ops/caddy/**'

  publish-and-deploy:
    name: Publish Images And Trigger Coolify
    needs: changes
    if: github.repository == 'SequoiaWynncraft/sequoia-map' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy == 'true')
    runs-on: apollo-sequoia
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Server Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.server == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.SERVER_IMAGE }}:main
            ${{ env.SERVER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-server
          cache-to: type=gha,mode=max,scope=map-server

      - name: Build And Push Ingest Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ingest == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/sequoia-ingest/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.INGEST_IMAGE }}:main
            ${{ env.INGEST_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-ingest
          cache-to: type=gha,mode=max,scope=map-ingest

      - name: Build And Push Edge Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.edge == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ops/caddy/Dockerfile.coolify
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.EDGE_IMAGE }}:main
            ${{ env.EDGE_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-edge
          cache-to: type=gha,mode=max,scope=map-edge

      - name: Trigger Coolify Deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK:-}" ]; then
            echo "Missing required secret: COOLIFY_WEBHOOK"
            exit 1
          fi

          if [ -n "${COOLIFY_TOKEN:-}" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_WEBHOOK}"
          else
            curl -fsS -X POST "${COOLIFY_WEBHOOK}"
          fi
