name: Deploy Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-server
  INGEST_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-ingest
  EDGE_IMAGE: ghcr.io/sequoiawynncraft/sequoia-map-edge

jobs:
  changes:
    if: github.repository == 'SequoiaWynncraft/sequoia-map'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ingest: ${{ steps.filter.outputs.ingest }}
      edge: ${{ steps.filter.outputs.edge }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect Deploy-Relevant Changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            server:
              - '.github/workflows/deploy-images.yml'
              - '.ci/**'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'shared/**'
              - 'client/**'
              - 'claims-client/**'
              - 'server/**'
            ingest:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'shared/**'
              - 'services/sequoia-ingest/**'
            edge:
              - '.github/workflows/deploy-images.yml'
              - 'docker-compose.coolify.yml'
              - 'ops/caddy/**'
            deploy:
              - '.github/workflows/deploy-images.yml'
              - '.ci/**'
              - 'docker-compose.coolify.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'shared/**'
              - 'client/**'
              - 'claims-client/**'
              - 'server/**'
              - 'services/sequoia-ingest/**'
              - 'ops/caddy/**'

  publish-and-deploy:
    name: Publish Images And Trigger Coolify
    needs: changes
    if: github.repository == 'SequoiaWynncraft/sequoia-map' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy == 'true')
    runs-on: apollo-sequoia-map
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate Coolify Deploy Credentials
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK:-}" ]; then
            echo "Missing required secret: COOLIFY_WEBHOOK"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN:-}" ]; then
            echo "Missing required secret: COOLIFY_TOKEN"
            exit 1
          fi

          COOLIFY_API_BASE="${COOLIFY_WEBHOOK%%/api/v1/deploy*}"
          PROBE_URL="${COOLIFY_API_BASE}/api/v1/deploy?uuid=auth-probe-missing-resource"
          PROBE_STATUS="$(curl --proto '=https' --tlsv1.2 --silent --show-error --output /tmp/coolify-probe.json --write-out '%{http_code}' \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${PROBE_URL}")"

          if [ "${PROBE_STATUS}" != "404" ]; then
            echo "Coolify deploy credential probe failed with status ${PROBE_STATUS}."
            cat /tmp/coolify-probe.json
            exit 1
          fi

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log In To GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Client Build Tool Archives
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.server == 'true'
        env:
          TAILWINDCSS_VERSION: 4.2.0
          TAILWINDCSS_LINUX_X64_SHA256: 8f65e2d21c675f1e8d265219979d17d10634c1f553a2f583265b7edb28726432
          WASM_BINDGEN_VERSION: 0.2.113
          WASM_BINDGEN_X64_MUSL_SHA256: 0366bf5936d5e2578b06fc318a5696ddecfb66382e671e51f469b83f3494712f
        run: |
          mkdir -p .ci/binaryen
          mkdir -p .ci/tailwindcss
          mkdir -p .ci/wasm-bindgen
          curl --proto '=https' --tlsv1.2 --http1.1 --retry 8 --retry-delay 2 --retry-all-errors --connect-timeout 20 --max-time 120 --speed-limit 1024 --speed-time 30 -fsSLo .ci/binaryen/binaryen.tar.gz \
            https://github.com/WebAssembly/binaryen/releases/download/version_126/binaryen-version_126-x86_64-linux.tar.gz
          curl --proto '=https' --tlsv1.2 --http1.1 --retry 8 --retry-delay 2 --retry-all-errors --connect-timeout 20 --max-time 60 -fsSLo .ci/binaryen/binaryen.tar.gz.sha256 \
            https://github.com/WebAssembly/binaryen/releases/download/version_126/binaryen-version_126-x86_64-linux.tar.gz.sha256
          EXPECTED_SHA="$(awk '{print $1}' .ci/binaryen/binaryen.tar.gz.sha256)"
          echo "${EXPECTED_SHA}  .ci/binaryen/binaryen.tar.gz" | sha256sum -c -
          curl --proto '=https' --tlsv1.2 --http1.1 --retry 8 --retry-delay 2 --retry-all-errors --connect-timeout 20 --max-time 120 --speed-limit 1024 --speed-time 30 -fsSLo .ci/tailwindcss/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWINDCSS_VERSION}/tailwindcss-linux-x64
          echo "${TAILWINDCSS_LINUX_X64_SHA256}" > .ci/tailwindcss/tailwindcss.sha256
          echo "${TAILWINDCSS_LINUX_X64_SHA256}  .ci/tailwindcss/tailwindcss" | sha256sum -c -
          curl --proto '=https' --tlsv1.2 --http1.1 --retry 8 --retry-delay 2 --retry-all-errors --connect-timeout 20 --max-time 120 --speed-limit 1024 --speed-time 30 -fsSLo .ci/wasm-bindgen/wasm-bindgen.tar.gz \
            https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz
          echo "${WASM_BINDGEN_X64_MUSL_SHA256}" > .ci/wasm-bindgen/wasm-bindgen.tar.gz.sha256
          echo "${WASM_BINDGEN_X64_MUSL_SHA256}  .ci/wasm-bindgen/wasm-bindgen.tar.gz" | sha256sum -c -

      - name: Build And Push Server Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.server == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.SERVER_IMAGE }}:main
            ${{ env.SERVER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-server
          cache-to: type=gha,mode=max,scope=map-server

      - name: Build And Push Ingest Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ingest == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./services/sequoia-ingest/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.INGEST_IMAGE }}:main
            ${{ env.INGEST_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-ingest
          cache-to: type=gha,mode=max,scope=map-ingest

      - name: Build And Push Edge Image
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.edge == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./ops/caddy/Dockerfile.coolify
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.EDGE_IMAGE }}:main
            ${{ env.EDGE_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=map-edge
          cache-to: type=gha,mode=max,scope=map-edge

      - name: Trigger Coolify Deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK:-}" ]; then
            echo "Missing required secret: COOLIFY_WEBHOOK"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN:-}" ]; then
            echo "Missing required secret: COOLIFY_TOKEN"
            exit 1
          fi

          curl --proto '=https' --tlsv1.2 --fail-with-body --silent --show-error --connect-timeout 10 --max-time 60 \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_WEBHOOK}"
