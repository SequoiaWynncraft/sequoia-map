name: Iris Release

on:
  push:
    tags:
      - 'iris-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: iris-v0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  IRIS_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build Iris Jars (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - "1.21.11"
          - "1.21.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set Up Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Profile ${{ matrix.profile }}
        working-directory: mods/wynn-iris
        run: ./build-target.sh "${{ matrix.profile }}"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iris-jars-${{ matrix.profile }}
          path: mods/wynn-iris/build/libs/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: iris-jars-*
          merge-multiple: true

      - name: Verify Release Files
        run: |
          ls -lah dist
          count="$(find dist -maxdepth 1 -type f -name '*.jar' | wc -l | tr -d ' ')"
          if [ "$count" -eq 0 ]; then
            echo "No jar artifacts found to publish"
            exit 1
          fi

      - name: Install Manifest Tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq openssl

      - name: Generate Signed Update Manifest
        env:
          IRIS_MANIFEST_SIGNING_KEY_PEM_B64: ${{ secrets.IRIS_MANIFEST_SIGNING_KEY_PEM_B64 }}
        run: |
          if [ -z "${IRIS_MANIFEST_SIGNING_KEY_PEM_B64:-}" ]; then
            echo "Missing required secret: IRIS_MANIFEST_SIGNING_KEY_PEM_B64"
            exit 1
          fi

          ./mods/wynn-iris/scripts/generate_update_manifest.sh dist "${IRIS_RELEASE_TAG}" "${{ github.repository }}"

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT

          secret_value="$(printf '%s' "$IRIS_MANIFEST_SIGNING_KEY_PEM_B64" | tr -d '\r')"
          secret_value="${secret_value#\"}"
          secret_value="${secret_value%\"}"
          parsed_key=0

          try_pem_candidate() {
            local candidate="$1"
            if ! printf '%s' "$candidate" | grep -q -- "-----BEGIN .*PRIVATE KEY-----"; then
              return 1
            fi
            printf '%s\n' "$candidate" > "$key_file"
            if openssl pkey -in "$key_file" -noout >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          if try_pem_candidate "$secret_value"; then
            parsed_key=1
          fi

          if [ "$parsed_key" -eq 0 ] && try_pem_candidate "$(printf '%b' "$secret_value")"; then
            parsed_key=1
          fi

          if [ "$parsed_key" -eq 0 ]; then
            normalized_b64="$(printf '%s' "$secret_value" | tr -d ' \t\n\r')"
            if printf '%s' "$normalized_b64" | base64 --decode > "$key_file" 2>/dev/null && openssl pkey -in "$key_file" -noout >/dev/null 2>&1; then
              parsed_key=1
            else
              normalized_b64_url="$(printf '%s' "$normalized_b64" | tr '_-' '/+')"
              remainder=$(( ${#normalized_b64_url} % 4 ))
              if [ "$remainder" -eq 2 ]; then
                normalized_b64_url="${normalized_b64_url}=="
              elif [ "$remainder" -eq 3 ]; then
                normalized_b64_url="${normalized_b64_url}="
              elif [ "$remainder" -eq 1 ]; then
                normalized_b64_url=""
              fi
              if [ -n "$normalized_b64_url" ] && printf '%s' "$normalized_b64_url" | base64 --decode > "$key_file" 2>/dev/null && openssl pkey -in "$key_file" -noout >/dev/null 2>&1; then
                parsed_key=1
              fi
            fi
          fi

          if [ "$parsed_key" -eq 0 ]; then
            echo "Invalid IRIS_MANIFEST_SIGNING_KEY_PEM_B64 secret: expected raw PEM or base64-encoded PEM"
            exit 1
          fi

          expected_pub_b64="$(
            awk '
              /SIGNING_PUBLIC_KEY_BASE64_DER/ { capture=1; next }
              capture && /"/ {
                gsub(/^[^"]*"/, "", $0)
                gsub(/".*$/, "", $0)
                print $0
                exit
              }
            ' mods/wynn-iris/src/main/java/io/iris/reporter/IrisAutoUpdater.java
          )"
          if [ -z "$expected_pub_b64" ]; then
            echo "Unable to read SIGNING_PUBLIC_KEY_BASE64_DER from IrisAutoUpdater.java"
            exit 1
          fi

          derived_pub_b64="$(openssl pkey -in "$key_file" -pubout -outform DER 2>/dev/null | base64 --wrap=0)"
          if [ "$derived_pub_b64" != "$expected_pub_b64" ]; then
            echo "Signing key mismatch: secret key does not match updater public key in IrisAutoUpdater.java"
            exit 1
          fi

          openssl pkeyutl -sign -rawin -inkey "$key_file" -in dist/iris-update-manifest.json -out dist/iris-update-manifest.sig

          rm -f "$key_file"
          trap - EXIT

      - name: Verify Manifest Artifacts
        run: |
          test -s dist/iris-update-manifest.json
          test -s dist/iris-update-manifest.sig

      - name: Create Or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            dist/*.jar
            dist/iris-update-manifest.json
            dist/iris-update-manifest.sig
