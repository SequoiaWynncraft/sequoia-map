x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: sequoia
      POSTGRES_USER: sequoia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - pgdata-dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    logging: *default-logging

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    stop_grace_period: 20s
    working_dir: /workspace
    command: ["cargo", "watch", "-w", "server", "-w", "shared", "-x", "run -p sequoia-server"]
    environment:
      DATABASE_URL: postgres://sequoia:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/sequoia
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN:?set INTERNAL_INGEST_TOKEN}
      API_BODY_LIMIT_BYTES: ${API_BODY_LIMIT_BYTES:-2097152}
      MAX_INGEST_UPDATES_PER_REQUEST: ${MAX_INGEST_UPDATES_PER_REQUEST:-1024}
      RUST_LOG: info
      CARGO_TARGET_DIR: /workspace/target/dev-native
      CARGO_INCREMENTAL: "1"
      CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-16}
      CARGO_PROFILE_DEV_DEBUG: ${CARGO_PROFILE_DEV_DEBUG:-0}
      RUSTFLAGS: "${RUSTFLAGS_NATIVE_DEV:--C debuginfo=0}"
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    logging: *default-logging

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    stop_grace_period: 20s
    working_dir: /workspace/services/sequoia-ingest
    command: ["cargo", "watch", "-w", "src", "-w", "Cargo.toml", "-w", "../../shared", "-x", "run"]
    environment:
      SEQUOIA_INGEST_BIND: 0.0.0.0:3010
      SEQUOIA_INGEST_DB_URL: sqlite:///data/sequoia-ingest.db?mode=rwc
      SEQUOIA_SERVER_URL: http://server:3000
      SEQUOIA_INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN:?set INTERNAL_INGEST_TOKEN}
      INGEST_DEGRADED_SINGLE_REPORTER_ENABLED: ${INGEST_DEGRADED_SINGLE_REPORTER_ENABLED:-true}
      INGEST_API_BODY_LIMIT_BYTES: ${INGEST_API_BODY_LIMIT_BYTES:-2097152}
      INGEST_MAX_REPORTS_PER_BATCH: ${INGEST_MAX_REPORTS_PER_BATCH:-1024}
      RUST_LOG: info
      CARGO_TARGET_DIR: /workspace/target/dev-native
      CARGO_INCREMENTAL: "1"
      CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-16}
      CARGO_PROFILE_DEV_DEBUG: ${CARGO_PROFILE_DEV_DEBUG:-0}
      RUSTFLAGS: "${RUSTFLAGS_NATIVE_DEV:--C debuginfo=0}"
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
      - ingest-data:/data
    depends_on:
      server:
        condition: service_started
    ports:
      - "3010:3010"
    logging: *default-logging

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    stop_grace_period: 10s
    working_dir: /workspace/client
    command: ["trunk", "serve", "--config", "Trunk.dev.toml"]
    environment:
      CARGO_TARGET_DIR: /workspace/target/dev-wasm
      CARGO_INCREMENTAL: "1"
      CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-16}
      CARGO_PROFILE_DEV_DEBUG: ${CARGO_PROFILE_DEV_DEBUG:-0}
      RUSTFLAGS: "${RUSTFLAGS_WASM_DEV:--C debuginfo=0}"
      NO_COLOR: "false"
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
      - trunk-cache:/workspace/.trunk
    depends_on:
      server:
        condition: service_started
    ports:
      - "8080:8080"
    logging: *default-logging

volumes:
  pgdata-dev:
  cargo-registry:
  cargo-git:
  target-cache:
  trunk-cache:
  ingest-data:
